version: '3.9'

services:
  api:
    ports: []
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  celery:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  celery-beat:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  frontend:
    ports: []
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://mdaas.shareinvestimentos.com.br

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
